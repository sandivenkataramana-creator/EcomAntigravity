services:
  - type: web
    name: ecom-unified
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecomantigravity
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: ecomantigravity
    plan: free